name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Android APK
        uses: duckduckant/html-to-apk@v1.0
        with:
          app-name: "Mark Labs"
          icon-path: "" # Leave empty if you don't have one
          
